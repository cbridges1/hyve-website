<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="1280" height="720" fill="#000000"/>
  
  <!-- Logo positioned in center-left, scaled up -->
  <g transform="translate(200, 250) scale(3)">
    <!-- Beehive pattern with 4 white rectangular blocks -->
    <!-- Block 1: Same width as block 3 -->
    <rect x="20" y="0" width="60" height="16" fill="#ffffff" rx="2"/>
    
    <!-- Block 2: Still the widest -->
    <rect x="10" y="24" width="80" height="16" fill="#ffffff" rx="2"/>
    
    <!-- Block 3: Wider than before -->
    <rect x="20" y="48" width="60" height="16" fill="#ffffff" rx="2"/>
    
    <!-- Block 4: Decreased to match difference -->
    <rect x="35" y="72" width="30" height="16" fill="#ffffff" rx="2"/>
  </g>
  
  <!-- Project title - larger and repositioned -->
  <text x="540" y="400" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ffffff">Hyve</text>
  
  <!-- Tagline - larger and more visible -->
  <text x="540" y="450" font-family="Arial, sans-serif" font-size="24" fill="#888888">Kubernetes cluster management powered by Git</text>
</svg>