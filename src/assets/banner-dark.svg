<svg width="960" height="720" viewBox="0 -33 960 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Worker bees in hard hats assembling the Hyve logo block by block">
  <defs>
    <style>
      /* Dark-theme palette: white blocks on a transparent background.
         banner-light.svg is identical except for these values. */
      svg {
        --block: #ffffff;
        --hex: #2a2a2a;
        --ground: #2f2f2f;
        --slot: #5c5c5c;
        --guide: #454545;
        --rope: #8a8a8a;
        --wing: #ffffff;
        --clipboard: #d9d9d9;
      }
      .wing {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: flap 0.16s ease-in-out infinite alternate;
      }
      .wing-back { animation-delay: 0.08s; }
      @keyframes flap {
        from { transform: scaleY(1) rotate(0deg); }
        to   { transform: scaleY(0.35) rotate(-8deg); }
      }
      .bob   { animation: bob 2.6s ease-in-out infinite; }
      .bob-2 { animation: bob 3.1s ease-in-out infinite; animation-delay: 0.6s; }
      .bob-3 { animation: bob 2.2s ease-in-out infinite; animation-delay: 1.1s; }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-9px); }
      }
      .drift { animation: drift 9s ease-in-out infinite; }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50%      { transform: translate(-26px, 14px); }
      }
      .dash-crawl {
        stroke-dasharray: 8 8;
        animation: crawl 1.6s linear infinite;
      }
      @keyframes crawl {
        to { stroke-dashoffset: -16; }
      }
    </style>

    <!-- Worker bee, facing right, body centered on (0,0) -->
    <g id="bee">
      <!-- wings -->
      <ellipse class="wing wing-back" cx="-6" cy="-19" rx="9" ry="13" fill="var(--wing)" stroke="#6b7280" stroke-width="1" opacity="0.55"/>
      <ellipse class="wing" cx="5" cy="-20" rx="10" ry="15" fill="var(--wing)" stroke="#6b7280" stroke-width="1" opacity="0.8"/>
      <!-- stinger -->
      <path d="M -18 -2 L -29 2 L -17 6 Z" fill="#3a3a3a"/>
      <!-- body -->
      <ellipse cx="0" cy="0" rx="20" ry="14" fill="#FFC53D"/>
      <clipPath id="bee-body-clip">
        <ellipse cx="0" cy="0" rx="20" ry="14"/>
      </clipPath>
      <g clip-path="url(#bee-body-clip)">
        <rect x="-12" y="-15" width="8" height="30" fill="#2b2b2b"/>
        <rect x="2" y="-15" width="8" height="30" fill="#2b2b2b"/>
      </g>
      <ellipse cx="0" cy="0" rx="20" ry="14" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
      <!-- legs -->
      <path d="M -6 13 q -2 6 -6 8 M 4 14 q 0 6 -3 9" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- head -->
      <circle cx="23" cy="-2" r="9.5" fill="#3a3a3a"/>
      <circle cx="26.5" cy="-4" r="2.2" fill="#ffffff"/>
      <!-- hard hat -->
      <path d="M 13.5 -7 A 9.5 9.5 0 0 1 32.5 -7 Z" fill="#FF9F1C"/>
      <rect x="11" y="-8.5" width="24" height="3.5" rx="1.75" fill="#FF9F1C"/>
      <rect x="21" y="-19" width="4" height="5" rx="2" fill="#FF9F1C"/>
    </g>

    <!-- faint hex for the background texture -->
    <path id="hex" d="M 20 0 L 40 11.5 L 40 34.5 L 20 46 L 0 34.5 L 0 11.5 Z" fill="none" stroke="var(--hex)" stroke-width="1.5"/>
  </defs>

  <!-- faint honeycomb texture (background is transparent so the banner blends into the page) -->
  <g opacity="0.5">
    <use href="#hex" x="70" y="80"/>
    <use href="#hex" x="130" y="520"/>
    <use href="#hex" x="820" y="150"/>
    <use href="#hex" x="770" y="560"/>
    <use href="#hex" x="60" y="330"/>
    <use href="#hex" x="860" y="380"/>
  </g>

  <!-- ground line -->
  <line x1="240" y1="612" x2="720" y2="612" stroke="var(--ground)" stroke-width="3" stroke-linecap="round"/>

  <!-- ===== the hive: three rows already placed (bottom-up) ===== -->
  <rect x="420" y="536" width="120" height="64" rx="8" fill="var(--block)"/>
  <rect x="360" y="440" width="240" height="64" rx="8" fill="var(--block)"/>
  <rect x="320" y="344" width="320" height="64" rx="8" fill="var(--block)"/>

  <!-- target slot for the final (top) block -->
  <rect class="dash-crawl" x="360" y="248" width="240" height="64" rx="8" fill="none" stroke="var(--slot)" stroke-width="2.5"/>

  <!-- guide lines from carried block down to the slot -->
  <g stroke="var(--guide)" stroke-width="1.5" stroke-dasharray="3 7">
    <line x1="330" y1="188" x2="366" y2="246"/>
    <line x1="540" y1="164" x2="594" y2="246"/>
  </g>

  <!-- ===== final block airlifted in by two bees ===== -->
  <g class="bob">
    <g transform="translate(316, 96) rotate(-6)">
      <!-- carry ropes -->
      <line x1="18" y1="-4" x2="24" y2="28" stroke="var(--rope)" stroke-width="2"/>
      <line x1="222" y1="-10" x2="216" y2="24" stroke="var(--rope)" stroke-width="2"/>
      <!-- the block -->
      <rect x="0" y="24" width="240" height="64" rx="8" fill="var(--block)"/>
      <!-- carrier bees -->
      <use href="#bee" transform="translate(14, -18) scale(0.9)"/>
      <use href="#bee" transform="translate(226, -24) scale(0.9) scale(-1,1)"/>
    </g>
  </g>

  <!-- ===== foreman bee checking the last placed row ===== -->
  <g class="bob-2">
    <use href="#bee" transform="translate(238, 376) scale(0.85)"/>
    <!-- clipboard -->
    <g transform="translate(268, 386) rotate(8)">
      <rect x="0" y="0" width="26" height="34" rx="3" fill="var(--clipboard)" stroke="#8a8a8a" stroke-width="1"/>
      <rect x="7" y="-4" width="12" height="7" rx="2" fill="#8a8a8a"/>
      <path d="M 5 10 l 4 4 l 7 -8 M 5 24 h 16" stroke="#3a3a3a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ===== bee hauling a spare bolt up the right side ===== -->
  <g class="bob-3">
    <g transform="translate(704, 470)">
      <use href="#bee" transform="scale(0.72) scale(-1,1)"/>
      <line x1="-4" y1="10" x2="-6" y2="30" stroke="var(--rope)" stroke-width="2"/>
      <path d="M -6 30 l 9 5.2 v 10.4 l -9 5.2 l -9 -5.2 v -10.4 Z" fill="#FFC53D"/>
      <circle cx="-6" cy="40.4" r="3.4" fill="#3a3a3a"/>
    </g>
  </g>

  <!-- ===== small bee drifting in the background ===== -->
  <g class="drift" opacity="0.7">
    <use href="#bee" transform="translate(806, 236) scale(0.5) scale(-1,1)"/>
  </g>
</svg>
